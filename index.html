<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1" name="viewport"/>
<title>Cybersecurity Threat Timeline</title>
<meta content="Interactive timeline of famous hacks, ransomware attacks, data breaches, and zero-day exploits." name="description"/>
<style>
  :root{
    --bg:#080b0c;
    --surface:#101615;
    --surface-2:#151d1b;
    --surface-3:#1b2422;
    --border:#2a3734;
    --text:#eef5f2;
    --muted:#9aaba5;
    --faint:#6f817a;
    --grid:#26312f;
    --ransomware:#ff5c7a;
    --breach:#4cb8ff;
    --zero-day:#ffc857;
    --accent:#54e0a5;
    --shadow:0 18px 44px rgba(0,0,0,.32);
  }

  *{box-sizing:border-box}

  html{min-height:100%}

  body{
    min-height:100%;
    margin:0;
    font-family:Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    background:
      linear-gradient(90deg, rgba(255,255,255,.035) 1px, transparent 1px),
      linear-gradient(0deg, rgba(255,255,255,.025) 1px, transparent 1px),
      var(--bg);
    background-size:48px 48px;
    color:var(--text);
  }

  body::before{
    content:"";
    position:fixed;
    inset:0;
    pointer-events:none;
    background:linear-gradient(140deg, rgba(84,224,165,.09), transparent 32%, rgba(255,92,122,.07) 72%, transparent);
  }

  header,
  .container{
    width:min(1500px, 100%);
    margin:0 auto;
    padding-inline:clamp(14px, 3vw, 32px);
    position:relative;
  }

  header{
    padding-top:clamp(24px, 4vw, 48px);
    padding-bottom:18px;
  }

  .hero{
    display:grid;
    grid-template-columns:minmax(0, 1fr) auto;
    gap:24px;
    align-items:end;
  }

  h1{
    margin:0;
    max-width:820px;
    font-size:clamp(2rem, 4.5vw, 4.8rem);
    line-height:.95;
    letter-spacing:0;
  }

  .sub{
    max-width:860px;
    margin:14px 0 0;
    color:var(--muted);
    font-size:clamp(.95rem, 1.2vw, 1.08rem);
    line-height:1.6;
  }

  .stats{
    display:grid;
    grid-template-columns:repeat(2, minmax(96px, 1fr));
    gap:10px;
    min-width:240px;
  }

  .stat{
    border:1px solid var(--border);
    border-radius:8px;
    background:rgba(16,22,21,.76);
    padding:12px 14px;
    box-shadow:var(--shadow);
  }

  .stat span{
    display:block;
    color:var(--muted);
    font-size:.74rem;
    text-transform:uppercase;
    letter-spacing:.08em;
  }

  .stat strong{
    display:block;
    margin-top:5px;
    font-size:1.12rem;
  }

  .container{
    padding-bottom:56px;
  }

  .panel{
    border:1px solid var(--border);
    border-radius:8px;
    background:rgba(16,22,21,.86);
    box-shadow:var(--shadow);
  }

  .controls{
    display:grid;
    grid-template-columns:repeat(4, minmax(0, 1fr)) auto;
    gap:10px;
    align-items:start;
    padding:12px;
  }

  .dropdown{
    position:relative;
    border:1px solid var(--border);
    border-radius:8px;
    background:var(--surface-2);
  }

  .dropdown button{
    width:100%;
    min-height:48px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    border:0;
    background:transparent;
    color:var(--text);
    padding:11px 13px;
    font:inherit;
    font-weight:700;
    cursor:pointer;
  }

  .dropdown button:focus-visible,
  .incident-marker:focus-visible{
    outline:2px solid var(--accent);
    outline-offset:3px;
  }

  .value{
    color:var(--muted);
    font-weight:600;
    white-space:nowrap;
  }

  .caret{
    color:var(--accent);
    transition:transform .18s ease;
  }

  .dropdown[aria-expanded="true"] .caret{
    transform:rotate(180deg);
  }

  .content{
    display:none;
    position:absolute;
    top:calc(100% + 6px);
    left:0;
    right:0;
    z-index:10;
    border:1px solid var(--border);
    border-radius:8px;
    background:#0c1110;
    padding:10px;
    box-shadow:0 18px 34px rgba(0,0,0,.45);
  }

  .dropdown[aria-expanded="true"] .content{
    display:block;
  }

  select{
    width:100%;
    border:1px solid var(--border);
    border-radius:6px;
    background:var(--surface);
    color:var(--text);
    padding:10px;
    font:inherit;
  }

  select[multiple]{
    min-height:13rem;
  }

  .legend-sticky{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    align-items:center;
    justify-content:flex-end;
    min-width:320px;
  }

  .chip{
    display:inline-flex;
    align-items:center;
    gap:8px;
    min-height:34px;
    border:1px solid var(--border);
    border-radius:999px;
    background:var(--surface-3);
    padding:7px 10px;
    color:var(--text);
    font-size:.78rem;
    font-weight:700;
    white-space:nowrap;
  }

  .dot{
    width:10px;
    height:10px;
    border-radius:50%;
    flex:0 0 auto;
  }

  .viz{
    margin-top:14px;
    overflow:hidden;
  }

  .viz-header{
    display:flex;
    justify-content:space-between;
    gap:16px;
    align-items:center;
    border-bottom:1px solid var(--border);
    padding:14px 16px;
  }

  .viz-title{
    margin:0;
    font-size:1rem;
    letter-spacing:0;
  }

  .viz-meta{
    color:var(--muted);
    font-size:.88rem;
    white-space:nowrap;
  }

  #chart{
    display:block;
    width:100%;
    min-height:360px;
    padding:4px 0 12px;
  }

  .axis-label,
  .industry-label,
  .svg-empty{
    fill:var(--muted);
    font-size:12px;
  }

  .industry-label{
    font-weight:700;
  }

  .grid-line{
    stroke:var(--grid);
    stroke-width:1;
  }

  .row-line{
    stroke:rgba(154,171,165,.18);
    stroke-width:1;
  }

  .incident-marker{
    cursor:pointer;
  }

  .incident-halo{
    opacity:.18;
  }

  .incident-dot{
    stroke:#07100d;
    stroke-width:2;
  }

  .incident-marker:hover .incident-halo,
  .incident-marker:focus .incident-halo{
    opacity:.32;
  }

  .tooltip{
    position:fixed;
    z-index:20;
    max-width:min(420px, calc(100vw - 24px));
    pointer-events:none;
    opacity:0;
    border:1px solid var(--border);
    border-radius:8px;
    background:#0b100f;
    color:var(--text);
    padding:12px 14px;
    box-shadow:0 18px 40px rgba(0,0,0,.46);
    transition:opacity .12s ease;
  }

  .tooltip h4{
    margin:0 0 6px;
    font-size:.98rem;
  }

  .tooltip .meta{
    margin-bottom:8px;
    color:var(--muted);
    font-size:.78rem;
  }

  .tooltip .desc{
    margin:0;
    color:#d8e3df;
    font-size:.84rem;
    line-height:1.55;
  }

  #timelineList{
    display:none;
  }

  .event-card{
    --event-color:var(--accent);
    position:relative;
    border:1px solid var(--border);
    border-radius:8px;
    background:var(--surface-2);
    padding:14px 14px 14px 18px;
  }

  .event-card::before{
    content:"";
    position:absolute;
    top:14px;
    bottom:14px;
    left:0;
    width:4px;
    border-radius:0 4px 4px 0;
    background:var(--event-color);
  }

  .event-card[data-type="Ransomware"]{--event-color:var(--ransomware)}
  .event-card[data-type="Data Breach"]{--event-color:var(--breach)}
  .event-card[data-type="Zero-day"]{--event-color:var(--zero-day)}

  .event-card__date{
    color:var(--event-color);
    font-size:.78rem;
    font-weight:800;
  }

  .event-card h3{
    margin:5px 0 4px;
    font-size:1rem;
    line-height:1.25;
    letter-spacing:0;
  }

  .event-card__meta{
    color:var(--muted);
    font-size:.82rem;
  }

  .event-card p{
    margin:10px 0 0;
    color:#d5dfdb;
    font-size:.9rem;
    line-height:1.55;
  }

  .empty-state{
    margin:0;
    color:var(--muted);
    padding:24px;
  }

  @media (max-width: 1180px){
    .controls{
      grid-template-columns:repeat(2, minmax(0, 1fr));
    }

    .legend-sticky{
      grid-column:1 / -1;
      justify-content:flex-start;
      min-width:0;
    }
  }

  @media (max-width: 820px){
    .hero{
      grid-template-columns:1fr;
      align-items:start;
    }

    .stats{
      min-width:0;
      width:100%;
    }
  }

  @media (max-width: 760px){
    header,
    .container{
      padding-inline:12px;
    }

    h1{
      font-size:clamp(2.15rem, 12vw, 3.5rem);
    }

    .controls{
      grid-template-columns:1fr;
      padding:10px;
    }

    .content{
      position:static;
      margin:0 10px 10px;
      box-shadow:none;
    }

    .legend-sticky{
      justify-content:flex-start;
    }

    .viz-header{
      align-items:flex-start;
      flex-direction:column;
      gap:4px;
    }

    .viz-meta{
      white-space:normal;
    }

    #chart{
      display:none;
    }

    #timelineList{
      display:grid;
      gap:10px;
      padding:12px;
    }
  }

  @media (max-width: 420px){
    .stats{
      grid-template-columns:1fr;
    }

    .chip{
      flex:1 1 auto;
      justify-content:center;
    }
  }
</style>
</head>
<body>
<header>
  <div class="hero">
    <div>
      <h1>Cybersecurity Threat Timeline</h1>
      <p class="sub">Major hacks, ransomware outbreaks, data breaches, and zero-day exploits from 1990 through 2025, organized across industries and attack categories.</p>
    </div>
    <div class="stats" aria-live="polite">
      <div class="stat">
        <span>Showing</span>
        <strong id="countLabel">0 incidents</strong>
      </div>
      <div class="stat">
        <span>Range</span>
        <strong id="rangeLabel">1990-2025</strong>
      </div>
    </div>
  </div>
</header>
<main class="container">
  <section aria-label="Timeline controls" class="panel">
    <div class="controls">
      <div aria-expanded="false" class="dropdown" id="dd-from">
        <button aria-controls="dd-from-content" type="button">
          <span>From</span>
          <span class="value" id="fromLabel">1990</span>
          <span class="caret" aria-hidden="true">▾</span>
        </button>
        <div class="content" id="dd-from-content">
          <select aria-label="From year" id="fromYearSelect"></select>
        </div>
      </div>
      <div aria-expanded="false" class="dropdown" id="dd-to">
        <button aria-controls="dd-to-content" type="button">
          <span>To</span>
          <span class="value" id="toLabel">2025</span>
          <span class="caret" aria-hidden="true">▾</span>
        </button>
        <div class="content" id="dd-to-content">
          <select aria-label="To year" id="toYearSelect"></select>
        </div>
      </div>
      <div aria-expanded="false" class="dropdown" id="dd-industry">
        <button aria-controls="dd-industry-content" type="button">
          <span>Industry</span>
          <span class="value" id="indLabel">(all)</span>
          <span class="caret" aria-hidden="true">▾</span>
        </button>
        <div class="content" id="dd-industry-content">
          <select aria-label="Filter by industry" id="industrySelect" multiple size="8"></select>
        </div>
      </div>
      <div aria-expanded="false" class="dropdown" id="dd-type">
        <button aria-controls="dd-type-content" type="button">
          <span>Attack type</span>
          <span class="value" id="typeLabel">(all)</span>
          <span class="caret" aria-hidden="true">▾</span>
        </button>
        <div class="content" id="dd-type-content">
          <select aria-label="Attack type" id="typeSelect"></select>
        </div>
      </div>
      <div class="legend-sticky" aria-label="Attack type legend">
        <span class="chip"><span class="dot" style="background:var(--ransomware)"></span>Ransomware</span>
        <span class="chip"><span class="dot" style="background:var(--breach)"></span>Data Breach</span>
        <span class="chip"><span class="dot" style="background:var(--zero-day)"></span>Zero-day</span>
      </div>
    </div>
  </section>
  <section aria-label="Timeline visualization" class="panel viz">
    <div class="viz-header">
      <h2 class="viz-title">Threat Activity</h2>
      <div class="viz-meta">Major incidents across industries</div>
    </div>
    <svg aria-labelledby="chartTitle chartDesc" id="chart" role="img">
      <title id="chartTitle">Cybersecurity incidents timeline</title>
      <desc id="chartDesc">Dots represent incidents positioned by date and industry. Color encodes attack type.</desc>
    </svg>
    <div id="timelineList" aria-live="polite"></div>
  </section>
</main>
<div class="tooltip" id="tooltip" style="opacity:0"></div>
<script src="app.js" defer></script>
</body>
</html>
